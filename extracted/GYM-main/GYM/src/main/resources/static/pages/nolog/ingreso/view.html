<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../../css/style.css">
    <title>GYM Ingreso</title>
    <script src="controller.js" defer></script> <!-- Carga del archivo controller.js -->
</head>
<body>
<!-- Franja superior -->
<div class="top-bar">
    <div class="logo-title">
        <img src="../../../images/maquinaimage.jpg" alt="Logo Instructores">
        <h1>Ingreso</h1>
        <button onclick="window.location.href='http://localhost:8080/'">Volver</button>
    </div>
</div>

<nav class="nav-menu">
    <a href="../inicio/view.html">Inicio</a>
    <a href="../inscripcion/view.html">Inscripción</a>
    <a href="../maquinas/view.html">Máquinas</a>
</nav>

<!-- Formulario de Login -->
<div id="login-container" class="login-container">
    <form>
        <div class="login-form">
            <h1>Inicio de Sesión</h1>
            <label for="username">Usuario:</label>
            <input type="text" placeholder="Usuario" id="username" name="username" required autofocus>
            <label for="password">Contraseña:</label>
            <input type="password" placeholder="Contraseña" id="password" name="password" required>
            <div class="main-title">
                <button id="loginButton" type="submit">Ingresar</button>
            </div>
        </div>
    </form>
</div>

<div class="footer">
    <p>Sistema Gym Wellness Sky Bumstead</p>
</div>

</body>
</html>
