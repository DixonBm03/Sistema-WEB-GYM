<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../css/style.css">
    <title>GYM Maquinas</title>
    <script src="controller.js" defer></script>
</head>
<body>
<!-- Franja superior -->
<div class="top-bar">
    <div class="logo-title">
        <img src="../../../images/maquinaimage.jpg" alt="Logo Maquinas">
        <h1>Maquinas</h1>
        <button onclick="window.location.href='../principal/view.html'">Volver</button>

    </div>
</div>
<div class="main-title">
    <h2>Maquinas</h2>
</div>
<div class="container">
    <!-- Formulario -->
    <div class="form-container">
        <form>
            <label for="id">ID Máquina:</label>
            <input type="text" id="id" name="id" placeholder="ID" required>

            <label for="descripcion">Descripción:</label>
            <input type="text" id="descripcion" name="descripcion" placeholder="Descripción" required>

            <label for="estado">Estado:</label>
            <input type="text" id="estado" placeholder="Estado" required>

            <div class="button-container">
                <button type="submit" id="guardar">Guardar</button>
                <button type="button" id="limpiar">Limpiar</button>
                <button type="button" id="actualizar">Actualizar</button>
            </div>
        </form>
    </div>

    <!-- Tabla -->
    <div class="table-container">
        <table class="crud-table">
            <thead>
            <tr>
                <th>ID Máquina</th>
                <th>Descripción</th>
                <th>Estado</th>
            </tr>
            </thead>
            <tbody>
            <!-- Aquí se llenarán los datos de las máquinas -->
            </tbody>
        </table>
        <button type="button" id="eliminar">Eliminar</button>
    </div>
</div>
<div class="footer">
    <p>Sistema Gym Wellness Sky Bumstead</p>
</div>
</body>
</html>
